[build]
  command = "npm run build:node"
  publish = ".netlify/static"

[build.environment]
  NODE_VERSION = "20"
  NITRO_PRESET = "netlify"

# Required for TanStack Start SSR — all requests are handled by the Nitro
# server function generated by the netlify preset.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
